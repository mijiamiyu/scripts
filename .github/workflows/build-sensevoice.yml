name: Build SenseVoice transcribe binaries

on:
  push:
    branches: [main]
    paths:
      - 'sensevoice/**'
      - '.github/workflows/build-sensevoice.yml'
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: windows-latest, arch: x64,    target: windows-x64,  artifact_name: transcribe.exe }
          - { os: windows-latest, arch: x86,    target: windows-x86,  artifact_name: transcribe.exe }
          - { os: macos-latest,   arch: arm64,  target: macos-arm64,  artifact_name: transcribe }
          - { os: macos-13,       arch: x64,    target: macos-x64,    artifact_name: transcribe }
    runs-on: ${{ matrix.os }}
    name: build-${{ matrix.target }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          architecture: ${{ matrix.arch }}

      - name: install deps
        run: |
          python -m pip install --upgrade pip
          pip install sherpa-onnx pyinstaller numpy imageio-ffmpeg

      - name: pyinstaller build transcribe
        working-directory: sensevoice
        run: |
          pyinstaller --onefile --collect-all sherpa_onnx --name transcribe transcribe.py

      - name: extract bundled ffmpeg into dist/
        shell: bash
        run: |
          python -c "
          import imageio_ffmpeg, shutil, os, sys
          src = imageio_ffmpeg.get_ffmpeg_exe()
          ext = '.exe' if sys.platform.startswith('win') else ''
          dst = 'sensevoice/dist/ffmpeg' + ext
          shutil.copy(src, dst)
          os.chmod(dst, 0o755)
          print(f'ffmpeg: {src} -> {dst}')
          print(f'size: {os.path.getsize(dst) / 1024 / 1024:.1f} MB')
          "

      - name: list dist
        working-directory: sensevoice/dist
        shell: bash
        run: ls -la

      - uses: actions/upload-artifact@v4
        with:
          name: transcribe-${{ matrix.target }}
          path: sensevoice/dist/
          if-no-files-found: error
