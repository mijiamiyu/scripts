name: Build SenseVoice transcribe binaries

on:
  push:
    branches: [main]
    paths:
      - 'sensevoice/**'
      - '.github/workflows/build-sensevoice.yml'
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: windows-latest, arch: x64,    target: windows-x64,  artifact_name: transcribe.exe }
          - { os: windows-latest, arch: x86,    target: windows-x86,  artifact_name: transcribe.exe }
          - { os: macos-latest,   arch: arm64,  target: macos-arm64,  artifact_name: transcribe }
          - { os: macos-13,       arch: x64,    target: macos-x64,    artifact_name: transcribe }
    runs-on: ${{ matrix.os }}
    name: build-${{ matrix.target }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          architecture: ${{ matrix.arch }}

      - name: install deps
        run: |
          python -m pip install --upgrade pip
          pip install sherpa-onnx pyinstaller numpy

      - name: pyinstaller build
        working-directory: sensevoice
        run: |
          pyinstaller --onefile --collect-all sherpa_onnx --name transcribe transcribe.py

      - name: list output
        working-directory: sensevoice/dist
        shell: bash
        run: ls -la

      - uses: actions/upload-artifact@v4
        with:
          name: transcribe-${{ matrix.target }}
          path: sensevoice/dist/${{ matrix.artifact_name }}
          if-no-files-found: error
