name: Test config-python.sh

on:
  push:
    paths:
      - 'config-python.sh'
      - '.github/workflows/test-config-python.yml'
  pull_request:
    paths:
      - 'config-python.sh'
  workflow_dispatch:

jobs:
  test:
    runs-on: macos-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Cache Python pkg
        id: cache-python
        uses: actions/cache@v4
        with:
          path: python.pkg
          key: python-3.13.3-macos11

      - name: Download Python 3.13.3 pkg (from python.org)
        if: steps.cache-python.outputs.cache-hit != 'true'
        run: curl -fsSL -o python.pkg https://www.python.org/ftp/python/3.13.3/python-3.13.3-macos11.pkg

      - name: Install Python pkg (simulate student double-click)
        run: |
          sudo installer -pkg python.pkg -target /
          /Library/Frameworks/Python.framework/Versions/3.13/bin/python3 --version

      - name: First run of config-python.sh
        run: bash config-python.sh

      - name: Verify PATH written to .zprofile
        run: |
          if ! grep -qF "Python.framework/Versions/3.13/bin" ~/.zprofile; then
            echo "::error::PATH not in .zprofile"
            cat ~/.zprofile
            exit 1
          fi
          echo "OK: .zprofile contains PATH"

      - name: Verify PATH written to .bash_profile
        run: |
          if ! grep -qF "Python.framework/Versions/3.13/bin" ~/.bash_profile; then
            echo "::error::PATH not in .bash_profile"
            exit 1
          fi
          echo "OK: .bash_profile contains PATH"

      - name: Verify python3 resolves to framework version
        run: |
          source ~/.zprofile
          which python3
          ver=$(python3 --version)
          if [[ "$ver" != *"3.13"* ]]; then
            echo "::error::python3 not 3.13: $ver"
            exit 1
          fi
          echo "OK: python3 = $ver (from framework)"

      - name: Second run (test idempotency)
        run: bash config-python.sh

      - name: Verify .zprofile not duplicated
        run: |
          count=$(grep -cF "Python.framework/Versions/3.13/bin" ~/.zprofile)
          if [ "$count" -ne 1 ]; then
            echo "::error::Idempotency failed: expected 1 PATH line, got $count"
            cat ~/.zprofile
            exit 1
          fi
          echo "OK: .zprofile still has exactly 1 PATH line after 2 runs"

      - name: Verify .bash_profile not duplicated
        run: |
          count=$(grep -cF "Python.framework/Versions/3.13/bin" ~/.bash_profile)
          if [ "$count" -ne 1 ]; then
            echo "::error::Idempotency failed: expected 1 PATH line, got $count"
            cat ~/.bash_profile
            exit 1
          fi
          echo "OK: .bash_profile still has exactly 1 PATH line after 2 runs"

      - name: Verify pip config uses tsinghua mirror
        run: |
          source ~/.zprofile
          # 让 pip 自己列出当前配置(不去猜 pip.conf 文件位置 — pip 版本不同位置不同:
          #   ~/.config/pip/pip.conf / ~/Library/Application Support/pip/pip.conf / ~/.pip/pip.conf)
          out=$(python3 -m pip config list 2>&1)
          echo "$out"
          if echo "$out" | grep -q "tuna"; then
            echo "OK: pip configured with tsinghua mirror"
          else
            echo "::error::pip not configured with tsinghua mirror"
            # 顺便找一下 pip.conf 都在哪,帮 debug
            find "$HOME/.pip" "$HOME/.config/pip" "$HOME/Library/Application Support/pip" -name "pip.conf" 2>/dev/null || true
            exit 1
          fi

      - name: Verify Install Certificates.command exists
        run: |
          cert="/Applications/Python 3.13/Install Certificates.command"
          if [ ! -f "$cert" ]; then
            echo "::error::Certificate script not found: $cert"
            exit 1
          fi
          echo "OK: certificate script exists"
